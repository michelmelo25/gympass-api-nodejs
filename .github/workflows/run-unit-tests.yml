name: Run Unit Tests

on: [push]

jobs: 
    run-unit-test:
        name: Run Unit Tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                node-version: 24
                cache: 'npm'
            
            - run: npm ci
            - run: npx prisma generate
              env:
                DATABASE_URL: "postgresql://user:password@localhost:5432/test_db"

            - run: npm run test